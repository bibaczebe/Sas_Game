<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sword and Sandals Online</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060308;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Form elements used inside Phaser DOM ─────────────────────────────── */

    .sas-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    /* Input fields — dark stone texture feel */
    .sas-input {
      width: 300px;
      padding: 10px 14px;
      background: rgba(4, 2, 8, 0.90);
      border: 1px solid #3d2510;
      border-bottom: 2px solid #6B3A15;
      color: #E8C060;
      font-size: 15px;
      font-family: Georgia, serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      image-rendering: pixelated;
      /* pixel-art sharp feel: no rounded corners */
      border-radius: 0;
    }

    .sas-input::placeholder {
      color: rgba(160, 100, 30, 0.35);
      font-style: italic;
    }

    .sas-input:focus {
      border-color: #FFD700;
      border-bottom-color: #FFD700;
      box-shadow: 0 2px 0 0 rgba(255, 215, 0, 0.2),
                  inset 0 0 8px rgba(255, 180, 0, 0.06);
    }

    /* Primary action button */
    .sas-btn {
      width: 300px;
      padding: 12px;
      margin-top: 4px;
      background: linear-gradient(180deg,
        #7A3010 0%,
        #4A1A06 50%,
        #3A1204 100%
      );
      border: 1px solid #8B4513;
      border-top: 2px solid #CD7030;
      border-bottom: 3px solid #2a0a02;
      /* No border-radius — pixel art style */
      border-radius: 0;
      color: #FFD700;
      font-size: 15px;
      font-family: Georgia, serif;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: filter 0.1s, transform 0.1s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      image-rendering: pixelated;
    }

    .sas-btn:hover {
      filter: brightness(1.3);
      color: #FFF0A0;
    }

    .sas-btn:active {
      filter: brightness(0.85);
      transform: translateY(1px);
      border-bottom-width: 2px;
    }

    .sas-btn:disabled {
      filter: brightness(0.5);
      cursor: not-allowed;
    }

    /* Secondary / smaller button */
    .sas-btn.secondary {
      background: linear-gradient(180deg, #1a0e06 0%, #0d0702 100%);
      border-color: #4A2A10;
      border-top-color: #6B3A15;
      font-size: 13px;
      letter-spacing: 1px;
      color: #CD853F;
    }

    /* Error text */
    .sas-error {
      color: #FF5555;
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      text-shadow: 0 0 6px rgba(255,0,0,0.4);
    }

    /* Field label */
    .sas-label {
      color: rgba(180, 120, 40, 0.75);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      align-self: flex-start;
      margin-bottom: -8px;
    }

    /* ─── Scrollbar styling ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0500; }
    ::-webkit-scrollbar-thumb { background: #5C3A1A; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #8B5A2A; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
